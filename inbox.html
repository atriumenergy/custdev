<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — inbox (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-1:hsl(240 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);--bg-warning:hsl(38 90% 96%);--border-warning:hsl(38 80% 85%);
    --radius:10px;--shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:20px 0 8px}
  .item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);font:inherit;color:inherit;transition:transform .12s,box-shadow .12s}
  .item:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
  .item.blocked{border-style:dashed;border-color:var(--border-strong)}
  .item.done{opacity:.5;cursor:default;box-shadow:none}
  .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
  .ic.act{background:hsl(240 40% 96%);color:var(--primary)}
  .ic.warn{background:var(--bg-warning);color:var(--text-warning)}
  .ic.ok{background:var(--bg-success);color:var(--text-success)}
  .it-t{font-weight:600;font-size:14px}
  .it-s{font-size:12px;color:var(--text-muted)}
  .chip{flex-shrink:0;font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .chip.money{color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%)}
  .chip.accent{color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%)}
  .chip.warn{color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning)}
  /* shared leaf */
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-btn.sm{padding:5px 11px;font-size:13px}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.est{border-style:dashed;border-color:var(--border-strong)}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip2{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip2 .k{font-size:12px;color:var(--text-muted)}
  .chip2 .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .measured{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:99px;padding:3px 9px}
  .esttag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-warning)}
  .fid-banner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:10px;padding:9px 12px;margin-bottom:14px}
  .disc{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
  .disc-toggle{background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;padding:2px 0}
  .disc-body{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .disc-msg{max-width:85%;background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
  .disc-msg.me{align-self:flex-end;background:hsl(240 60% 97%);border-color:hsl(240 40% 90%)}
  .disc-name{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
  .disc-text{font-size:13px}
  .disc-att{margin-top:6px;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:4px 8px}
  .disc-reply{display:flex;gap:6px;margin-top:2px}
  .disc-reply input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:var(--surface-1)}
</style>
</head>
<body>
<div class="wrap">
<div class="banner"><i class="ti ti-info-circle"></i> Concept preview · sample data — for feedback, not final visual design</div>
<div id="app">Loading…</div>
</div>
<script>
(function(){
  var app=document.getElementById('app');
  var SOL={
    s1:{id:'s1',prop:'Marina Bay Inn',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'about 6 weeks · starts Sep',fidelity:'measured',market:430000,discountPct:12,incentive:130000,savings:75000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
    s5:{id:'s5',prop:'Cedar Court Hotel',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'about 5 weeks',fidelity:'measured',market:300000,discountPct:12,incentive:90000,savings:53000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
    s2:{id:'s2',prop:'Marina Bay Inn',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'measured',market:72000,discountPct:12,incentive:15000,savings:17000,loan:{termYears:7,aprPct:6.9},lease:null},
    s8:{id:'s8',prop:'Riverside Lodge',type:'Heat Pump Water Heaters',u:0,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'estimated',dataNeed:'your water-heater metering',savings:12000},
    s9:{id:'s9',prop:'Riverside Lodge',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'about 1 week',fidelity:'estimated',dataNeed:'occupancy data',savings:12500}
  };
  var ITEMS=[
    {id:'i1',sec:'need',kind:'reply',solId:'s1',icon:'ti-message',iconc:'accent',title:'Reply to Dana about the battery phasing',sub:'Marina Bay Inn · Solar + Batteries',chip:'1 new',chipc:'accent'},
    {id:'i2',sec:'need',kind:'approve',solId:'s5',icon:'ti-bolt',iconc:'act',title:'Approve — Solar + Batteries',sub:'Cedar Court Hotel',chip:'money'},
    {id:'i3',sec:'need',kind:'approve',solId:'s2',icon:'ti-bolt',iconc:'act',title:'Approve — Heat Pump Water Heaters',sub:'Marina Bay Inn',chip:'money'},
    {id:'i4',sec:'need',kind:'sign',propId:'Summit Ridge Suites',icon:'ti-file-check',iconc:'act',title:'Approve & sign — proposal ready',sub:'Summit Ridge Suites',chip:'$180K',chipc:'money'},
    {id:'i5',sec:'wait',kind:'blocked',solId:'s8',icon:'ti-plug-connected',iconc:'warn',title:'Connect water-heater metering',sub:'Riverside Lodge · Heat Pump Water Heaters',chip:'blocked',chipc:'warn'},
    {id:'i6',sec:'wait',kind:'blocked',solId:'s9',icon:'ti-plug-connected',iconc:'warn',title:'Connect occupancy data',sub:'Riverside Lodge · Smart Thermostats',chip:'blocked',chipc:'warn'},
    {id:'i7',sec:'wait',kind:'audit',propId:'Grandview Hotel',icon:'ti-clipboard-check',iconc:'warn',title:'Complete your audit to unlock proposals',sub:'Grandview Hotel',chip:'blocked',chipc:'warn'}
  ];
  var S={screen:'home',itemId:null,period:'annual',mode:{},disc:{},approved:{},done:{}};
  var UL=['Now','Soon','Later'];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function est(s){return s.fidelity==='estimated';}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function savLo(s){return Math.round(s.savings*0.75/1000)*1000;}
  function savHi(s){return Math.round(s.savings*1.25/1000)*1000;}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var m=S.mode[s.id]||'cash';return ms.indexOf(m)>=0?m:'cash';}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function perRange(lo,hi){return S.period==='monthly'?fmt(Math.round(lo/12))+'–'+fmt(Math.round(hi/12))+'/mo':fmtK(lo)+'–'+fmtK(hi)+'/yr';}
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){return {hero:'+'+per(sav),sub:'One-time '+fmt(nt)+' upfront, then it’s yours',chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(),be:pay,beLabel:'breaks even at '+pay.toFixed(1)+' yrs',takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};}
    if(mode==='loan'){var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;return {hero:'+'+per(sav-ann),sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'%',chips:[['Savings','+'+per(sav)],['Loan payment','−'+per(ann)],['Payback',pay.toFixed(1)+' yrs']],series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(),be:0.05,beLabel:'cash-flow positive from day one',takeaway:'$0 down; you net '+per(sav-ann)+' from day one — best near-term cash flow.'};}
    var la=s.lease.annualAtrium,t2=s.lease.termYears;return {hero:'+'+per(sav-la),sub:'$0 down · '+t2+'-yr lease',chips:[['Savings','+'+per(sav)],['Lease cost','−'+per(la)],['Term',t2+' yrs']],series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(),be:0.05,beLabel:'cash-flow positive from year one',takeaway:'$0 down; net '+per(sav-la)+' a year, no ownership or upkeep.'};
  }
  function spark(series,be){var w=300,h=72,pad=8,vals=series.concat([0]);var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;function X(y){return pad+(y/10)*(w-2*pad);}function Y(v){return pad+(1-(v-mn)/sp)*(h-2*pad);}var pts=series.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');var area=pts+' '+X(10).toFixed(1)+','+Y(mn).toFixed(1)+' '+X(0).toFixed(1)+','+Y(mn).toFixed(1);return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block"><polygon points="'+area+'" fill="hsl(86 45% 95%)"/><line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/><polyline points="'+pts+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/><circle cx="'+X(be).toFixed(1)+'" cy="'+Y(0).toFixed(1)+'" r="3.5" fill="var(--primary)"/></svg>';}
  var THREAD=[{name:'Dana · Atrium',text:'Here’s the proposal — happy to walk you through any of the numbers.',me:false,att:'proposal.pdf'},{name:'You',text:'Can we phase the battery portion to next year?',me:true}];
  function discussion(s){var open=S.disc[s.id];return '<div class="disc"><button class="disc-toggle" data-disc="'+s.id+'"><i class="ti ti-message"></i> Questions &amp; notes ('+THREAD.length+') <i class="ti ti-chevron-'+(open?'up':'down')+'"></i></button>'+(open?'<div class="disc-body">'+THREAD.map(function(m){return '<div class="disc-msg'+(m.me?' me':'')+'"><div class="disc-name">'+m.name+'</div><div class="disc-text">'+esc(m.text)+'</div>'+(m.att?'<div class="disc-att"><i class="ti ti-paperclip"></i> '+m.att+'</div>':'')+'</div>';}).join('')+'<div class="disc-reply"><input placeholder="Write a message…" disabled><button class="cf-pill" disabled>Send</button></div></div>':'')+'</div>';}
  function cardHead(s){return '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px"><div><div style="font-size:18px;font-weight:700">'+esc(s.type)+'</div><div style="font-size:13px;color:var(--text-muted);margin-top:2px">'+esc(s.prop)+' · <i class="ti ti-tool"></i> '+esc(s.vendor)+' · '+esc(s.install)+'</div></div><span style="font-size:12px;font-weight:600;color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%);border-radius:99px;padding:4px 10px;white-space:nowrap"><i class="ti ti-calendar"></i> '+UL[s.u]+'</span></div>';}
  function solutionCard(s){
    if(est(s)){var lo=savLo(s),hi=savHi(s);return '<div class="card est">'+cardHead(s)+'<div class="fid-banner"><i class="ti ti-alert-triangle"></i> Pre-audit estimate — connect '+esc(s.dataNeed)+' to turn this into a firm, guaranteed quote.<button class="cf-btn sm" data-act="connect">Connect data</button></div><div style="margin-bottom:6px"><div style="font-size:12px;color:var(--text-muted)">Estimated savings <span class="esttag"><i class="ti ti-help-circle"></i> rough range</span></div><div class="mono" style="font-size:28px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+perRange(lo,hi)+'</div></div><p style="font-size:13px;color:var(--text-secondary);margin:.2rem 0 0">Firm price, incentives, and Cash / Loan / Lease options appear once we have your data.</p>'+discussion(s)+'</div>';}
    var mode=curMode(s),e=econ(s,mode),ms=solModes(s),hint={cash:'Buy outright',loan:'Finance',lease:'Rent'};
    var payseg=ms.map(function(m){return '<button data-sol="'+s.id+'" data-segmode="'+m+'" aria-pressed="'+(mode===m)+'"><span style="display:block">'+cap(m)+'</span><span style="display:block;font-size:11px;font-weight:500;opacity:.85">'+hint[m]+'</span></button>';}).join('');
    var chips=e.chips.map(function(k){return '<div class="chip2"><div class="k">'+k[0]+'</div><div class="v mono">'+k[1]+'</div></div>';}).join('');
    var savePct=Math.round((s.market-price(s))/s.market*100);
    return '<div class="card">'+cardHead(s)+'<div style="margin-bottom:12px"><span class="measured"><i class="ti ti-circle-check"></i> Measured from your data</span></div><div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);background:hsl(240 20% 98%);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:16px"><span style="text-decoration:line-through;color:var(--text-muted)">'+fmt(s.market)+' market</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i><span>'+fmt(price(s))+' Atrium price <span style="color:var(--text-success);font-weight:600">(−'+savePct+'%)</span></span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i><span style="color:var(--text-success);font-weight:600">−'+fmt(s.incentive)+' incentive</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i><span style="font-weight:700;color:var(--text-primary)">'+fmt(net(s))+' your net</span></div><div style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px">How you’ll pay</div><div class="payseg" style="margin-bottom:16px">'+payseg+'</div><div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text-muted)">Net cash flow</div><div class="mono" style="font-size:30px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+e.hero+'</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+e.sub+'</div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:12px">'+chips+'</div><div style="background:hsl(240 20% 98.5%);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">'+spark(e.series,e.be)+'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span>10 yrs</span></div></div><div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px"><i class="ti ti-bulb" style="color:var(--text-warning)"></i> '+e.takeaway+'</div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><button class="cf-btn" data-approve="'+s.id+'"><i class="ti ti-check"></i> Approve with '+cap(mode)+'</button><button class="ghost"><i class="ti ti-file-text"></i> View full quote</button></div>'+discussion(s)+'</div>';
  }
  function backPill(){return '<button class="cf-pill" data-act="back" style="display:inline-flex;align-items:center;gap:4px"><i class="ti ti-arrow-left"></i> Inbox</button>';}
  function perToggle(){return '<div class="seg"><button data-period="annual" aria-pressed="'+(S.period==='annual')+'">Annual</button><button data-period="monthly" aria-pressed="'+(S.period==='monthly')+'">Monthly</button></div>';}
  function chipFor(it){
    if(it.chip==='money'){var s=SOL[it.solId];return '<span class="chip money mono">'+fmtK(fiveCash(s))+'</span>';}
    return '<span class="chip '+(it.chipc||'accent')+'">'+esc(it.chip)+'</span>';
  }
  function itemRow(it){
    var done=S.done[it.id];
    return '<button class="item'+(it.sec==='wait'?' blocked':'')+(done?' done':'')+'"'+(done?' disabled':'')+' data-item="'+it.id+'"><span class="ic '+(done?'ok':it.iconc)+'"><i class="ti '+(done?'ti-check':it.icon)+'"></i></span><span style="min-width:0;flex:1"><span class="it-t" style="display:block">'+esc(it.title)+'</span><span class="it-s">'+esc(it.sub)+'</span></span>'+(done?'<span class="chip" style="color:var(--text-muted)">done</span>':chipFor(it))+'</button>';
  }
  function renderHome(){
    var need=ITEMS.filter(function(i){return i.sec==='need';}), wait=ITEMS.filter(function(i){return i.sec==='wait';});
    var openNeed=need.filter(function(i){return !S.done[i.id];}).length;
    app.innerHTML='<div style="margin-bottom:.5rem"><h1 style="font-size:26px">Your inbox</h1><p style="color:var(--text-muted);margin:.3rem 0 0;font-size:14px">'+openNeed+' things need you. Clear them one at a time.</p></div>'
      +'<div class="sec">Needs you</div>'+need.map(itemRow).join('')
      +'<div class="sec">Waiting on data — connect it to unlock these</div>'+wait.map(itemRow).join('');
  }
  function propPanel(name,body,cta){
    app.innerHTML='<div style="margin-bottom:16px">'+backPill()+'</div><div class="card"><div style="font-size:18px;font-weight:700;margin-bottom:4px">'+esc(name)+'</div><p style="color:var(--text-secondary);font-size:14px;margin:0 0 14px">'+body+'</p><button class="cf-btn" data-act="dopanel"><i class="ti ti-arrow-right"></i> '+cta+'</button></div>';
  }
  function renderLeaf(){
    var it=ITEMS.find(function(x){return x.id===S.itemId;}); if(!it){S.screen='home';return renderHome();}
    if(it.kind==='sign'){return propPanel(it.propId,'The proposal for this property is ready to review and sign. This would open the full property agreement.','Review & sign');}
    if(it.kind==='audit'){return propPanel(it.propId,'We need an energy audit before we can propose firm, guaranteed projects here. It takes about an hour on-site.','Schedule the audit');}
    var s=SOL[it.solId];
    app.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()+(est(s)?'':'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span>')+'</div>'+solutionCard(s);
  }
  function render(){ if(S.screen==='home')renderHome();else renderLeaf(); }
  app.addEventListener('click',function(e){
    var d=e.target.closest('[data-disc]'); if(d){S.disc[d.dataset.disc]=!S.disc[d.dataset.disc];render();return;}
    var pertog=e.target.closest('[data-period]'); if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]'); if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var ap=e.target.closest('[data-approve]'); if(ap){S.approved[ap.dataset.approve]=1;S.done[S.itemId]=1;S.screen='home';render();return;}
    var it=e.target.closest('[data-item]'); if(it){S.itemId=it.dataset.item;var i=ITEMS.find(function(x){return x.id===S.itemId;});if(i&&i.kind==='reply'&&i.solId)S.disc[i.solId]=true;S.screen='leaf';render();return;}
    var el=e.target.closest('[data-act]'); if(!el)return;
    var a=el.dataset.act;
    if(a==='back'){S.screen='home';render();}
    else if(a==='connect'||a==='dopanel'){S.done[S.itemId]=1;S.screen='home';render();}
  });
  render();
})();
</script>
</body>
</html>
