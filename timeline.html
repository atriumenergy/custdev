<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — savings plan / timeline (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-1:hsl(240 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);
    --radius:10px;
    --shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);
    --shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;font-size:13px}
  .nav .brand{color:var(--text-muted);margin-right:4px;font-weight:600}
  .nav a{text-decoration:none;color:var(--text-secondary);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-weight:500}
  .nav a.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button:hover{border-color:var(--text-muted)}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  /* --- timeline / roadmap --- */
  .tl-scroll{overflow-x:auto;margin:0 -18px;padding:4px 18px 10px}
  .tl-row{display:flex;min-width:660px}
  .tl-col{flex:1;min-width:170px}
  .tl-col.cap{flex:0 0 78px;min-width:78px}
  .tl-node{position:relative;height:28px;margin-bottom:10px}
  .tl-line{position:absolute;top:12px;left:0;right:0;height:3px;background:var(--border-strong)}
  .tl-node.start .tl-line{left:50%}
  .tl-node.end .tl-line{right:50%}
  .tl-dot{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:var(--primary);border:3px solid var(--surface-0);box-shadow:0 0 0 1px var(--border-strong);z-index:1}
  .tl-node.warn .tl-dot{background:var(--text-warning)}
  .tl-node.goal .tl-dot{background:var(--text-success)}
  .tl-node.muted .tl-dot{background:var(--text-muted)}
  .tl-inner{padding:0 7px}
  .tl-time{font-size:13px;font-weight:700;text-align:center}
  .tl-cum{font-size:12px;color:var(--text-success);font-weight:600;text-align:center;margin-bottom:12px}
  .tl-event{display:block;width:100%;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);font:inherit;color:inherit;transition:transform .12s,box-shadow .12s}
  .tl-event:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
  .tl-event.warn{border-left-color:var(--text-warning)}
  .cf-fade{animation:cfOut .35s forwards}
  @keyframes cfOut{to{opacity:0;transform:scale(.96);height:0;margin:0;padding:0;border-width:0}}
</style>
</head>
<body>
<div class="wrap">
<nav class="nav"><span class="brand">Atrium · concept</span><a href="index.html">Cash-flow</a><a href="timeline.html" class="active">Timeline</a><a href="impact.html">Impact</a><a href="valuemap.html">Value map</a></nav>
<div class="banner"><i class="ti ti-info-circle"></i> Concept preview · sample data — for feedback, not final visual design</div>
<div id="app">Loading…</div>
</div>
<script>
(function(){
  var app=document.getElementById('app');
  var DATA={
    portfolio:"Coastline Hospitality Group",
    prospects:[
      {id:'p1',name:'Summit Ridge Suites',cf:180000,ready:true,step:'Proposal ready'},
      {id:'p2',name:'Harbor Point Hotel',cf:140000,ready:true,step:'Proposal ready'},
      {id:'p3',name:'Grandview Hotel',cf:110000,ready:false,step:'Complete your audit',est:true},
      {id:'p4',name:'Old Town Motel',cf:90000,ready:false,step:'Complete your audit',est:true},
      {id:'p5',name:'Pinewood Inn',cf:70000,ready:false,step:'Add your utility bills',est:true},
      {id:'p6',name:'Bayside Motor Lodge',cf:60000,ready:false,step:'Add your utility bills',est:true}
    ],
    solutions:[
      {id:'s1',prop:'Marina Bay Inn',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'~6 weeks · starts Sep',co2:180,market:430000,discountPct:12,incentive:130000,savings:75000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
      {id:'s5',prop:'Cedar Court Hotel',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'~5 weeks',co2:120,market:300000,discountPct:12,incentive:90000,savings:53000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
      {id:'s8',prop:'Riverside Lodge',type:'Heat Pump Water Heaters',u:0,vendor:'Thermal Systems',install:'~2 weeks',co2:40,market:52000,discountPct:12,incentive:12000,savings:12000,loan:{termYears:7,aprPct:6.9},lease:null},
      {id:'s2',prop:'Marina Bay Inn',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'~2 weeks',co2:55,market:72000,discountPct:12,incentive:15000,savings:17000,loan:{termYears:7,aprPct:6.9},lease:null},
      {id:'s9',prop:'Riverside Lodge',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'~1 week',co2:22,market:28000,discountPct:14,incentive:4000,savings:12500,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s6',prop:'Cedar Court Hotel',type:'LED Lighting',u:1,vendor:'BrightSwap',install:'~2 weeks',co2:30,market:46000,discountPct:13,incentive:6000,savings:13500,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s7',prop:'Cedar Court Hotel',type:'Ozone Laundry',u:1,vendor:'PureWash',install:'~1 week',co2:18,market:30000,discountPct:13,incentive:3000,savings:10000,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s3',prop:'Marina Bay Inn',type:'LED Lighting',u:2,vendor:'BrightSwap',install:'~2 weeks',co2:20,market:34000,discountPct:13,incentive:4000,savings:10000,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s4',prop:'Marina Bay Inn',type:'Smart Thermostats',u:2,vendor:'Cozy Controls',install:'~1 week',co2:8,market:10000,discountPct:14,incentive:1500,savings:4500,loan:{termYears:3,aprPct:7.9},lease:null}
    ]
  };
  var S={screen:'home',leafId:null,period:'annual',signed:{},approved:{},approvedMode:{},mode:{},unlocked:0};
  var UL=['Now','Soon','Later'];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var m=S.mode[s.id]||'cash';return ms.indexOf(m)>=0?m:'cash';}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function prospects(){return DATA.prospects.filter(function(p){return !S.signed[p.id];});}
  function sols(){return DATA.solutions.filter(function(s){return !S.approved[s.id];});}
  function recSort(a,b){ if(a.u!==b.u)return a.u-b.u; if((!!b.note)!==(!!a.note))return (b.note?1:0)-(a.note?1:0); return fiveCash(b)-fiveCash(a); }
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){
      return {hero:'+'+per(sav), sub:'One-time '+fmt(nt)+' upfront, then it’s yours',
        chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs',
        takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};
    }
    if(mode==='loan'){
      var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;
      return {hero:'+'+per(sav-ann), sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'%',
        chips:[['Savings','+'+per(sav)],['Loan payment','−'+per(ann)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from day one',
        takeaway:'$0 down; you net '+per(sav-ann)+' from day one — best near-term cash flow.'};
    }
    var la=s.lease.annualAtrium,t2=s.lease.termYears;
    return {hero:'+'+per(sav-la), sub:'$0 down · '+t2+'-yr lease',
      chips:[['Savings','+'+per(sav)],['Lease cost','−'+per(la)],['Term',t2+' yrs']],
      series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from year one',
      takeaway:'$0 down; net '+per(sav-la)+' a year, no ownership or upkeep.'};
  }
  function spark(series,be){
    var w=300,h=72,pad=8,vals=series.concat([0]);
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;
    function X(y){return pad+(y/10)*(w-2*pad);}
    function Y(v){return pad+(1-(v-mn)/sp)*(h-2*pad);}
    var pts=series.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');
    var area=pts+' '+X(10).toFixed(1)+','+Y(mn).toFixed(1)+' '+X(0).toFixed(1)+','+Y(mn).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 95%)"/>'
      +'<line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+pts+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<circle cx="'+X(be).toFixed(1)+'" cy="'+Y(0).toFixed(1)+'" r="3.5" fill="var(--primary)"/></svg>';
  }
  function backPill(){return '<button class="cf-pill" data-act="back" style="display:inline-flex;align-items:center;gap:4px"><i class="ti ti-arrow-left"></i> Back</button>';}
  function perToggle(){return '<div class="seg"><button data-period="annual" aria-pressed="'+(S.period==='annual')+'">Annual</button><button data-period="monthly" aria-pressed="'+(S.period==='monthly')+'">Monthly</button></div>';}
  function solutionCard(s){
    var mode=curMode(s), e=econ(s,mode), ms=solModes(s);
    var hint={cash:'Buy outright',loan:'Finance',lease:'Rent'};
    var payseg=ms.map(function(m){return '<button data-sol="'+s.id+'" data-segmode="'+m+'" aria-pressed="'+(mode===m)+'"><span style="display:block">'+cap(m)+'</span><span style="display:block;font-size:11px;font-weight:500;opacity:.85">'+hint[m]+'</span></button>';}).join('');
    var chips=e.chips.map(function(k){return '<div class="chip"><div class="k">'+k[0]+'</div><div class="v">'+k[1]+'</div></div>';}).join('');
    var savePct=Math.round((s.market-price(s))/s.market*100);
    return '<div class="card" data-row="'+s.id+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px">'
        +'<div><div style="font-size:18px;font-weight:700">'+esc(s.type)+'</div>'
          +'<div style="font-size:13px;color:var(--text-muted);margin-top:2px">'+esc(s.prop)+' · <i class="ti ti-tool"></i> '+esc(s.vendor)+' · '+esc(s.install)+'</div></div>'
        +'<span style="font-size:12px;font-weight:600;color:'+(s.u===0?'var(--text-warning)':'var(--primary)')+';background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%);border-radius:99px;padding:4px 10px;white-space:nowrap"><i class="ti ti-calendar"></i> Schedule: '+UL[s.u]+'</span></div>'
      +(s.note?'<div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-warning);background:hsl(24 80% 96%);border:1px solid hsl(24 70% 88%);border-radius:10px;padding:8px 12px;margin-bottom:14px"><i class="ti ti-clock"></i> '+esc(s.note)+' — schedule now to keep the incentive</div>':'')
      +'<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);background:hsl(240 20% 98%);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:16px">'
        +'<span style="text-decoration:line-through;color:var(--text-muted)">'+fmt(s.market)+' market</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span>'+fmt(price(s))+' Atrium price <span style="color:var(--text-success);font-weight:600">(−'+savePct+'%)</span></span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span style="color:var(--text-success);font-weight:600">−'+fmt(s.incentive)+' incentive</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span style="font-weight:700;color:var(--text-primary)">'+fmt(net(s))+' your net</span></div>'
      +'<div style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px">How you’ll pay</div>'
      +'<div class="payseg" style="margin-bottom:16px">'+payseg+'</div>'
      +'<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text-muted)">Net cash flow</div>'
        +'<div style="font-size:30px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+e.hero+'</div>'
        +'<div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+e.sub+'</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:12px">'+chips+'</div>'
      +'<div style="background:hsl(240 20% 98.5%);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">'
        +spark(e.series,e.be)
        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span>10 yrs</span></div></div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px"><i class="ti ti-bulb" style="color:var(--text-warning)"></i> '+e.takeaway+'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<button class="cf-btn" data-approve="'+s.id+'"><i class="ti ti-check"></i> Approve with '+cap(mode)+'</button>'
        +'<button class="ghost"><i class="ti ti-file-text"></i> View full quote</button>'
        +'<button class="ghost"><i class="ti ti-message"></i> Ask a question</button></div>'
    +'</div>';
  }
  function eventCard(s){
    var warn=!!s.note, lead=s.install.replace(/·.*/,'').trim();
    return '<button class="tl-event'+(warn?' warn':'')+'" data-act="leaf" data-val="'+s.id+'">'
      +'<div style="font-weight:600;font-size:14px">'+esc(s.prop)+'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin:1px 0 6px">'+esc(s.type)+'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;gap:6px">'
        +'<span class="mono" style="font-size:15px;font-weight:700;color:var(--text-success)">'+fmtK(s.savings)+'<span style="font-size:11px;color:var(--text-muted);font-weight:500">/yr</span></span>'
        +(warn?'<span style="font-size:11px;color:var(--text-warning);font-weight:600;white-space:nowrap"><i class="ti ti-clock"></i> '+esc(s.note)+'</span>':'<span style="font-size:11px;color:var(--text-muted);white-space:nowrap">starts '+esc(lead)+'</span>')
      +'</div></button>';
  }
  function renderHome(){
    var live=sols();
    var byU=function(u){return live.filter(function(s){return s.u===u;}).sort(recSort);};
    var buckets=[{u:0,title:'Now',warn:true},{u:1,title:'Next 3 months'},{u:2,title:'Later this year'}];
    var run=0, cols='';
    cols+='<div class="tl-col cap"><div class="tl-node start muted"><div class="tl-line"></div><div class="tl-dot"></div></div><div class="tl-inner"><div class="tl-time">Today</div><div class="tl-cum" style="color:var(--text-muted)">$0/yr</div></div></div>';
    buckets.forEach(function(b){
      var list=byU(b.u); run+=list.reduce(function(t,s){return t+s.savings;},0);
      var ev=list.length?list.map(eventCard).join(''):'<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:12px 0"><i class="ti ti-circle-check"></i> nothing pending</div>';
      cols+='<div class="tl-col"><div class="tl-node'+(b.warn?' warn':'')+'"><div class="tl-line"></div><div class="tl-dot"></div></div>'
        +'<div class="tl-inner"><div class="tl-time">'+b.title+'</div><div class="tl-cum">'+fmtK(run)+'/yr flowing</div>'+ev+'</div></div>';
    });
    cols+='<div class="tl-col cap"><div class="tl-node end goal"><div class="tl-line"></div><div class="tl-dot"></div></div><div class="tl-inner"><div class="tl-time">Optimized</div><div class="tl-cum">'+fmtK(run)+'/yr</div></div></div>';
    var setup=prospects().length?'<button class="cf-pill" data-act="setup" style="margin-bottom:16px"><i class="ti ti-building-community"></i> '+prospects().length+' properties still need setup to unlock their projects →</button>':'';
    app.innerHTML='<div style="margin-bottom:1rem"><p style="color:var(--text-secondary);margin:0;font-size:14px">'+esc(DATA.portfolio)+'</p>'
      +'<h1 style="margin:.2rem 0 .1rem;font-size:26px">Your savings plan</h1>'
      +'<p style="color:var(--text-muted);margin:0 0 1rem;font-size:13px">Move left to right: do the time-sensitive things now, and watch your yearly cash flow build to <span style="color:var(--text-success);font-weight:600">'+fmtK(run)+'/yr</span>.</p></div>'
      +setup
      +'<div class="tl-scroll"><div class="tl-row">'+cols+'</div></div>'
      +'<p style="color:var(--text-muted);font-size:12px;margin-top:8px"><i class="ti ti-arrow-move-right"></i> Each marker on the rail is a point in time; the cards beneath it are projects to schedule then. Tap one for the economics.</p>';
  }
  function renderSetup(){
    var list=prospects();
    var rows=list.map(function(p){
      var cta=p.ready?'<button class="cf-btn" data-act="sign" data-val="'+p.id+'">Approve &amp; sign</button>':'<button class="cf-pill" data-act="step" data-val="'+p.id+'">'+p.step+'</button>';
      return '<div data-row="'+p.id+'" style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface-2);border:1px '+(p.est?'dashed':'solid')+' '+(p.est?'var(--border-strong)':'var(--border)')+';border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)">'
        +'<div style="min-width:0"><p style="margin:0;font-weight:600">'+esc(p.name)+'</p><p style="margin:.15rem 0 0;font-size:13px;color:var(--text-muted)">'+(p.est?'Estimated · '+p.step:p.step)+'</p></div>'
        +'<div style="text-align:right;flex-shrink:0"><div style="font-size:19px;font-weight:700;color:var(--text-success)">'+fmtK(p.cf)+'</div><div style="margin-top:7px">'+cta+'</div></div></div>';
    }).join('');
    app.innerHTML='<div style="margin-bottom:1.25rem">'+backPill()+'<h1 style="margin:14px 0 0">Finish setting up</h1><p style="color:var(--text-secondary);margin:.3rem 0 0">Bring each property online — audits and bills turn on its projects.</p></div>'
      +(list.length?'<div style="display:flex;flex-direction:column;gap:10px">'+rows+'</div>':'<div class="card" style="text-align:center;padding:2rem"><i class="ti ti-circle-check" style="font-size:26px;color:var(--text-success)"></i><p style="margin:.5rem 0 0">Every property is set up.</p></div>');
  }
  function renderLeaf(){
    var s=DATA.solutions.find(function(x){return x.id===S.leafId;});
    if(!s||S.approved[s.id]){S.screen='home';return renderHome();}
    app.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()
      +'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span></div>'
      +solutionCard(s);
  }
  function render(){
    if(S.screen==='home')renderHome();
    else if(S.screen==='setup')renderSetup();
    else if(S.screen==='leaf')renderLeaf();
  }
  function unlockRow(id,amt,then){var row=app.querySelector('[data-row="'+id+'"]');S.unlocked+=amt;if(row){row.classList.add('cf-fade');setTimeout(then,340);}else then();}
  app.addEventListener('click',function(e){
    var pertog=e.target.closest('[data-period]');
    if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]');
    if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var el=e.target.closest('[data-act],[data-approve]'); if(!el)return;
    if(el.dataset.approve){var s=DATA.solutions.find(function(x){return x.id===el.dataset.approve;});var m=curMode(s);unlockRow(s.id,fiveCash(s),function(){S.approved[s.id]=1;S.approvedMode[s.id]=m;S.screen='home';render();});return;}
    var a=el.dataset.act, v=el.dataset.val;
    if(a==='setup'){S.screen='setup';render();}
    else if(a==='leaf'){S.leafId=v;S.screen='leaf';render();}
    else if(a==='back'){S.screen='home';render();}
    else if(a==='step'){el.textContent='We’ll guide you →';el.disabled=true;el.style.opacity=.6;}
    else if(a==='sign'){var p=DATA.prospects.find(function(x){return x.id===v;});unlockRow(v,p.cf,function(){S.signed[v]=1;render();});}
  });
  render();
})();
</script>
</body>
</html>
