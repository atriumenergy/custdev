<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — concept preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --primary:hsl(240 91% 20%);--primary-fg:#fff;
    --shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:26px 18px 64px}
  h1{font-weight:700;margin:0;font-size:26px;letter-spacing:-.01em}
  .sub{color:var(--text-secondary);margin:.35rem 0 0;font-size:14px}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin:20px 0 16px}
  .toggle{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--text-secondary);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--primary);width:15px;height:15px}
  .btn{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 13px;cursor:pointer;font:inherit;font-size:13px;font-weight:500;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--text-muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{display:flex;flex-direction:column;gap:6px;min-height:150px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);text-decoration:none;color:inherit;transition:transform .12s,box-shadow .12s,border-color .12s}
  a.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .card.soon{opacity:.55;border-style:dashed;box-shadow:none}
  .idx{width:26px;height:26px;border-radius:8px;background:hsl(240 40% 96%);color:var(--primary);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
  .nm{font-size:17px;font-weight:700}
  .ts{font-size:13px;color:var(--text-secondary)}
  .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text-muted)}
  .note{color:var(--text-muted);font-size:12px;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Atrium — concept preview</h1>
  <p class="sub">Nine directions for the same product. Open any concept in a new tab, click around the drill-downs, and tell us what resonates. Sample data throughout — not final visual design.</p>
  <div class="bar">
    <label class="toggle"><input type="checkbox" id="blind"> Blind labels (hide names for interviews)</label>
    <button class="btn" id="shuffle"><i class="ti ti-arrows-shuffle"></i> New order (next interviewee)</button>
  </div>
  <div class="grid" id="grid"></div>
  <p class="note" id="note"></p>
</div>
<script>
(function(){
  var CONCEPTS=[
    {key:'cashflow',   name:'Cash-flow',   teaser:'Money unlock — every tile is the 5-year cash flow it releases.', live:true},
    {key:'timeline',   name:'Timeline',    teaser:'A roadmap on a time rail; cash flow builds as you move right.', live:false},
    {key:'impact',     name:'Impact',      teaser:'Path to net-zero — CO₂ avoided leads, dollars ride along.', live:false},
    {key:'inbox',      name:'Inbox',       teaser:'A triage queue — clear what needs you, one item at a time.', live:true},
    {key:'scorecard',  name:'Scorecard',   teaser:'Your performance, compliance, and standing vs. peers.', live:false},
    {key:'copilot',    name:'Copilot',     teaser:'A conversational energy-advisor; approve right in the chat.', live:false},
    {key:'building',   name:'Building view',teaser:'The building by system, with live data and opportunities.', live:true},
    {key:'marketplace',name:'Marketplace', teaser:'Shop and bundle upgrades per property.', live:false},
    {key:'planner',    name:'Planner',     teaser:'A what-if sandbox — toggle projects, watch outcomes move.', live:false}
  ];
  var grid=document.getElementById('grid'), note=document.getElementById('note'), blindEl=document.getElementById('blind');
  function shuffleArr(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function order(){
    var o=null; try{o=JSON.parse(sessionStorage.getItem('cpOrder'));}catch(e){}
    if(!o||o.length!==CONCEPTS.length){o=shuffleArr(CONCEPTS.map(function(_,i){return i;}));try{sessionStorage.setItem('cpOrder',JSON.stringify(o));}catch(e){}}
    return o;
  }
  function render(){
    var blind=blindEl.checked, o=order();
    grid.innerHTML=o.map(function(idx,pos){
      var c=CONCEPTS[idx], label=blind?('Concept '+String.fromCharCode(65+pos)):c.name, ts=blind?'A direction for the same product — open and explore.':c.teaser;
      var foot=c.live?'<span>Open in new tab</span><i class="ti ti-external-link"></i>':'<span>In progress</span><i class="ti ti-dots"></i>';
      var inner='<div style="display:flex;align-items:center;gap:9px"><span class="idx">'+String.fromCharCode(65+pos)+'</span><span class="nm">'+label+'</span></div><span class="ts">'+ts+'</span><span class="foot">'+foot+'</span>';
      return c.live?'<a class="card" href="'+c.key+'.html" target="_blank" rel="noopener">'+inner+'</a>':'<div class="card soon">'+inner+'</div>';
    }).join('');
    note.textContent=blind?'Blind mode: names hidden and order reshuffled per interviewee — decode later from the tab’s URL. 3 of 9 concepts are wired up so far.':'3 of 9 concepts are wired up so far; the rest are in progress. Toggle blind labels + reshuffle before each interview.';
  }
  blindEl.addEventListener('change',render);
  document.getElementById('shuffle').addEventListener('click',function(){try{sessionStorage.removeItem('cpOrder');}catch(e){}render();});
  render();
})();
</script>
</body>
</html>
