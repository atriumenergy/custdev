<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — building view (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-1:hsl(240 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);--bg-warning:hsl(38 90% 96%);--border-warning:hsl(38 80% 85%);
    --radius:10px;--shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .pills{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 18px}
  .roof{width:100%;display:block}
  .bld{display:flex;flex-direction:column;gap:3px}
  .band{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:6px;padding:13px 14px;cursor:pointer;box-shadow:var(--shadow);font:inherit;color:inherit;transition:transform .1s,box-shadow .1s}
  .band:hover{transform:translateX(2px);box-shadow:var(--shadow-hover)}
  .band.est{border-left-color:var(--text-warning);border-style:dashed}
  .band-zone{flex-shrink:0;width:120px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
  .band-t{font-weight:600;font-size:14px}
  .band-live{font-size:12px;color:var(--text-secondary);margin-top:1px}
  .band-live .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--text-success);margin-right:4px;vertical-align:middle}
  .band-live.warn{color:var(--text-warning)}
  .band-opp{flex-shrink:0;text-align:right;font-weight:700;color:var(--text-success)}
  .ground{height:8px;background:var(--surface-1);border:1px solid var(--border);border-radius:0 0 8px 8px;margin-top:1px}
  /* shared leaf */
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-btn.sm{padding:5px 11px;font-size:13px}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .cf-pill[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.est{border-style:dashed;border-color:var(--border-strong)}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip2{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip2 .k{font-size:12px;color:var(--text-muted)}
  .chip2 .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .measured{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:99px;padding:3px 9px}
  .esttag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-warning)}
  .fid-banner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:10px;padding:9px 12px;margin-bottom:14px}
  .disc{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
  .disc-toggle{background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;padding:2px 0}
  .disc-body{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .disc-msg{max-width:85%;background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
  .disc-msg.me{align-self:flex-end;background:hsl(240 60% 97%);border-color:hsl(240 40% 90%)}
  .disc-name{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
  .disc-text{font-size:13px}
  .disc-att{margin-top:6px;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:4px 8px}
  .disc-reply{display:flex;gap:6px;margin-top:2px}
  .disc-reply input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:var(--surface-1)}
</style>
</head>
<body>
<div class="wrap">
<div class="banner"><i class="ti ti-info-circle"></i> Concept preview · sample data — for feedback, not final visual design</div>
<div id="app">Loading…</div>
</div>
<script>
(function(){
  var app=document.getElementById('app');
  var ZONES=['Roof','Guest floors — lighting','Guest floors — controls','Mechanical room','Laundry'];
  var SOLS=[
    {id:'s1',prop:'Marina Bay Inn',zone:'Roof',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'about 6 weeks · starts Sep',fidelity:'measured',live:'Generating 38 kW now · 6,200 kWh last month',market:430000,discountPct:12,incentive:130000,savings:75000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
    {id:'s3',prop:'Marina Bay Inn',zone:'Guest floors — lighting',type:'LED Lighting',u:2,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',live:'Lighting load 22 kW · on 18 h/day',market:34000,discountPct:13,incentive:4000,savings:10000,loan:{termYears:3,aprPct:7.9},lease:null},
    {id:'s4',prop:'Marina Bay Inn',zone:'Guest floors — controls',type:'Smart Thermostats',u:2,vendor:'Cozy Controls',install:'about 1 week',fidelity:'measured',live:'Avg setpoint 72°F · 61% occupancy',market:10000,discountPct:14,incentive:1500,savings:4500,loan:{termYears:3,aprPct:7.9},lease:null},
    {id:'s2',prop:'Marina Bay Inn',zone:'Mechanical room',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'measured',live:'Water heating 14,800 kWh/mo',market:72000,discountPct:12,incentive:15000,savings:17000,loan:{termYears:7,aprPct:6.9},lease:null},
    {id:'s5',prop:'Cedar Court Hotel',zone:'Roof',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'about 5 weeks',fidelity:'measured',live:'Generating 26 kW now · 4,400 kWh last month',market:300000,discountPct:12,incentive:90000,savings:53000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
    {id:'s6',prop:'Cedar Court Hotel',zone:'Guest floors — lighting',type:'LED Lighting',u:1,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',live:'Lighting load 19 kW · on 18 h/day',market:46000,discountPct:13,incentive:6000,savings:13500,loan:{termYears:3,aprPct:7.9},lease:null},
    {id:'s7',prop:'Cedar Court Hotel',zone:'Laundry',type:'Ozone Laundry',u:1,vendor:'PureWash',install:'about 1 week',fidelity:'estimated',dataNeed:'laundry-room metering',savings:10000},
    {id:'s8',prop:'Riverside Lodge',zone:'Mechanical room',type:'Heat Pump Water Heaters',u:0,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'estimated',dataNeed:'your water-heater metering',savings:12000},
    {id:'s9',prop:'Riverside Lodge',zone:'Guest floors — controls',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'about 1 week',fidelity:'estimated',dataNeed:'occupancy data',savings:12500}
  ];
  var PROPS=['Marina Bay Inn','Cedar Court Hotel','Riverside Lodge'];
  var S={screen:'home',prop:'Marina Bay Inn',leafId:null,period:'annual',mode:{},disc:{},approved:{}};
  var UL=['Now','Soon','Later'];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function est(s){return s.fidelity==='estimated';}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function savLo(s){return Math.round(s.savings*0.75/1000)*1000;}
  function savHi(s){return Math.round(s.savings*1.25/1000)*1000;}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var m=S.mode[s.id]||'cash';return ms.indexOf(m)>=0?m:'cash';}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function perRange(lo,hi){return S.period==='monthly'?fmt(Math.round(lo/12))+'–'+fmt(Math.round(hi/12))+'/mo':fmtK(lo)+'–'+fmtK(hi)+'/yr';}
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){return {hero:'+'+per(sav),sub:'One-time '+fmt(nt)+' upfront, then it’s yours',chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(),be:pay,beLabel:'breaks even at '+pay.toFixed(1)+' yrs',takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};}
    if(mode==='loan'){var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;return {hero:'+'+per(sav-ann),sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'%',chips:[['Savings','+'+per(sav)],['Loan payment','−'+per(ann)],['Payback',pay.toFixed(1)+' yrs']],series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(),be:0.05,beLabel:'cash-flow positive from day one',takeaway:'$0 down; you net '+per(sav-ann)+' from day one — best near-term cash flow.'};}
    var la=s.lease.annualAtrium,t2=s.lease.termYears;return {hero:'+'+per(sav-la),sub:'$0 down · '+t2+'-yr lease',chips:[['Savings','+'+per(sav)],['Lease cost','−'+per(la)],['Term',t2+' yrs']],series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(),be:0.05,beLabel:'cash-flow positive from year one',takeaway:'$0 down; net '+per(sav-la)+' a year, no ownership or upkeep.'};
  }
  function spark(series,be){var w=300,h=72,pad=8,vals=series.concat([0]);var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;function X(y){return pad+(y/10)*(w-2*pad);}function Y(v){return pad+(1-(v-mn)/sp)*(h-2*pad);}var pts=series.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');var area=pts+' '+X(10).toFixed(1)+','+Y(mn).toFixed(1)+' '+X(0).toFixed(1)+','+Y(mn).toFixed(1);return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block"><polygon points="'+area+'" fill="hsl(86 45% 95%)"/><line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/><polyline points="'+pts+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/><circle cx="'+X(be).toFixed(1)+'" cy="'+Y(0).toFixed(1)+'" r="3.5" fill="var(--primary)"/></svg>';}
  var THREAD=[{name:'Dana · Atrium',text:'Here’s the proposal — happy to walk you through any of the numbers.',me:false,att:'proposal.pdf'},{name:'You',text:'Can we phase the battery portion to next year?',me:true}];
  function discussion(s){var open=S.disc[s.id];return '<div class="disc"><button class="disc-toggle" data-disc="'+s.id+'"><i class="ti ti-message"></i> Questions &amp; notes ('+THREAD.length+') <i class="ti ti-chevron-'+(open?'up':'down')+'"></i></button>'+(open?'<div class="disc-body">'+THREAD.map(function(m){return '<div class="disc-msg'+(m.me?' me':'')+'"><div class="disc-name">'+m.name+'</div><div class="disc-text">'+esc(m.text)+'</div>'+(m.att?'<div class="disc-att"><i class="ti ti-paperclip"></i> '+m.att+'</div>':'')+'</div>';}).join('')+'<div class="disc-reply"><input placeholder="Write a message…" disabled><button class="cf-pill" disabled>Send</button></div></div>':'')+'</div>';}
  function cardHead(s){return '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px"><div><div style="font-size:18px;font-weight:700">'+esc(s.type)+'</div><div style="font-size:13px;color:var(--text-muted);margin-top:2px">'+esc(s.prop)+' · '+esc(s.zone)+' · <i class="ti ti-tool"></i> '+esc(s.vendor)+'</div></div><span style="font-size:12px;font-weight:600;color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%);border-radius:99px;padding:4px 10px;white-space:nowrap"><i class="ti ti-calendar"></i> '+UL[s.u]+'</span></div>';}
  function solutionCard(s){
    if(est(s)){var lo=savLo(s),hi=savHi(s);return '<div class="card est">'+cardHead(s)+'<div class="fid-banner"><i class="ti ti-alert-triangle"></i> No meter on this system yet — connect '+esc(s.dataNeed)+' to turn this estimate into a firm, guaranteed quote.<button class="cf-btn sm" data-act="connect">Connect data</button></div><div style="margin-bottom:6px"><div style="font-size:12px;color:var(--text-muted)">Estimated savings <span class="esttag"><i class="ti ti-help-circle"></i> rough range</span></div><div class="mono" style="font-size:28px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+perRange(lo,hi)+'</div></div><p style="font-size:13px;color:var(--text-secondary);margin:.2rem 0 0">Firm price, incentives, and Cash / Loan / Lease options appear once we have your data.</p>'+discussion(s)+'</div>';}
    var mode=curMode(s),e=econ(s,mode),ms=solModes(s),hint={cash:'Buy outright',loan:'Finance',lease:'Rent'};
    var payseg=ms.map(function(m){return '<button data-sol="'+s.id+'" data-segmode="'+m+'" aria-pressed="'+(mode===m)+'"><span style="display:block">'+cap(m)+'</span><span style="display:block;font-size:11px;font-weight:500;opacity:.85">'+hint[m]+'</span></button>';}).join('');
    var chips=e.chips.map(function(k){return '<div class="chip2"><div class="k">'+k[0]+'</div><div class="v mono">'+k[1]+'</div></div>';}).join('');
    var savePct=Math.round((s.market-price(s))/s.market*100);
    return '<div class="card">'+cardHead(s)+'<div style="margin-bottom:12px"><span class="measured"><i class="ti ti-circle-check"></i> Measured from your live data</span></div><div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);background:hsl(240 20% 98%);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:16px"><span style="text-decoration:line-through;color:var(--text-muted)">'+fmt(s.market)+' market</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i><span>'+fmt(price(s))+' Atrium price <span style="color:var(--text-success);font-weight:600">(−'+savePct+'%)</span></span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i><span style="color:var(--text-success);font-weight:600">−'+fmt(s.incentive)+' incentive</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i><span style="font-weight:700;color:var(--text-primary)">'+fmt(net(s))+' your net</span></div><div style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px">How you’ll pay</div><div class="payseg" style="margin-bottom:16px">'+payseg+'</div><div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text-muted)">Net cash flow</div><div class="mono" style="font-size:30px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+e.hero+'</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+e.sub+'</div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:12px">'+chips+'</div><div style="background:hsl(240 20% 98.5%);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">'+spark(e.series,e.be)+'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span>10 yrs</span></div></div><div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px"><i class="ti ti-bulb" style="color:var(--text-warning)"></i> '+e.takeaway+'</div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><button class="cf-btn" data-approve="'+s.id+'"><i class="ti ti-check"></i> Approve with '+cap(mode)+'</button><button class="ghost"><i class="ti ti-file-text"></i> View full quote</button></div>'+discussion(s)+'</div>';
  }
  function backPill(){return '<button class="cf-pill" data-act="back" style="display:inline-flex;align-items:center;gap:4px"><i class="ti ti-arrow-left"></i> Building</button>';}
  function perToggle(){return '<div class="seg"><button data-period="annual" aria-pressed="'+(S.period==='annual')+'">Annual</button><button data-period="monthly" aria-pressed="'+(S.period==='monthly')+'">Monthly</button></div>';}
  function renderHome(){
    var pills=PROPS.map(function(p){return '<button class="cf-pill" data-act="prop" data-val="'+esc(p)+'" aria-pressed="'+(S.prop===p)+'">'+esc(p)+'</button>';}).join('');
    var mine=SOLS.filter(function(s){return s.prop===S.prop&&!S.approved[s.id];}).sort(function(a,b){return ZONES.indexOf(a.zone)-ZONES.indexOf(b.zone);});
    var roof='<svg class="roof" viewBox="0 0 300 30" height="30" preserveAspectRatio="none"><polygon points="0,30 150,4 300,30" fill="hsl(240 14% 97%)" stroke="hsl(240 12% 82%)"/></svg>';
    var bands=mine.map(function(s){
      var live=est(s)?'<span class="band-live warn"><i class="ti ti-plug-connected-x"></i> No meter — connect '+esc(s.dataNeed)+'</span>':'<span class="band-live"><span class="dot"></span>'+esc(s.live)+'</span>';
      var opp=est(s)?'<span style="font-size:14px">'+perRange(savLo(s),savHi(s))+'</span><div style="font-size:11px;color:var(--text-muted);font-weight:500">estimate</div>':'<span style="font-size:16px">'+fmtK(fiveCash(s))+'</span><div style="font-size:11px;color:var(--text-muted);font-weight:500">5-yr cash</div>';
      return '<button class="band'+(est(s)?' est':'')+'" data-act="leaf" data-val="'+s.id+'"><span class="band-zone">'+esc(s.zone)+'</span><span style="flex:1;min-width:0"><span class="band-t">'+esc(s.type)+'</span>'+live+'</span><span class="band-opp">'+opp+'</span></button>';
    }).join('');
    app.innerHTML='<div><h1 style="font-size:26px">Your building — by system</h1><p style="color:var(--text-muted);margin:.3rem 0 0;font-size:14px">Each floor is a system. Green = we see it live; dashed = no meter yet. Tap a system for the opportunity.</p></div>'
      +'<div class="pills">'+pills+'</div>'+roof+'<div class="bld">'+(mine.length?bands:'<div class="card" style="text-align:center">All systems here are optimized.</div>')+'</div><div class="ground"></div>';
  }
  function renderLeaf(){
    var s=SOLS.find(function(x){return x.id===S.leafId;});
    if(!s||S.approved[s.id]){S.screen='home';return renderHome();}
    app.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()+(est(s)?'':'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span>')+'</div>'+solutionCard(s);
  }
  function render(){ if(S.screen==='home')renderHome();else renderLeaf(); }
  app.addEventListener('click',function(e){
    var d=e.target.closest('[data-disc]'); if(d){S.disc[d.dataset.disc]=!S.disc[d.dataset.disc];render();return;}
    var pertog=e.target.closest('[data-period]'); if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]'); if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var ap=e.target.closest('[data-approve]'); if(ap){S.approved[ap.dataset.approve]=1;S.screen='home';render();return;}
    var el=e.target.closest('[data-act]'); if(!el)return;
    var a=el.dataset.act,v=el.dataset.val;
    if(a==='prop'){S.prop=v;render();}
    else if(a==='leaf'){S.leafId=v;S.screen='leaf';render();}
    else if(a==='back'){S.screen='home';render();}
    else if(a==='connect'){el.textContent='Request sent →';el.disabled=true;el.style.opacity=.7;}
  });
  render();
})();
</script>
</body>
</html>
