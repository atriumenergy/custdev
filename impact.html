<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — path to net-zero (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(150 25% 98%);--surface-1:hsl(150 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(160 30% 12%);--text-secondary:hsl(160 8% 40%);--text-muted:hsl(160 8% 58%);
    --border:hsl(150 14% 88%);--border-strong:hsl(150 14% 80%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --eco:hsl(158 64% 30%);--bg-eco:hsl(158 45% 95%);--eco-border:hsl(158 40% 80%);
    --primary:hsl(158 64% 26%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);
    --radius:10px;
    --shadow:0 1px 2px rgba(16,40,30,.04),0 1px 3px rgba(16,40,30,.06);
    --shadow-hover:0 6px 18px rgba(16,40,30,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;font-size:13px}
  .nav .brand{color:var(--text-muted);margin-right:4px;font-weight:600}
  .nav a{text-decoration:none;color:var(--text-secondary);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-weight:500}
  .nav a.active{background:var(--eco);color:var(--primary-fg);border-color:var(--eco)}
  .banner{display:flex;align-items:center;gap:8px;background:var(--bg-eco);border:1px solid var(--eco-border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .cf-sq{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left;width:100%;font:inherit;color:inherit;box-shadow:var(--shadow)}
  .cf-sq:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .cf-amt{font-weight:700;letter-spacing:-.01em}
  .cf-btn{background:var(--eco);color:var(--primary-fg);border:1px solid var(--eco);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;transition:filter .12s}
  .cf-btn:hover{filter:brightness(1.12)}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .seg{display:inline-flex;background:hsl(158 20% 95%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--eco);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button:hover{border-color:var(--text-muted)}
  .payseg button[aria-pressed="true"]{background:var(--eco);color:var(--primary-fg);border-color:var(--eco)}
  .chip{background:hsl(158 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .track{height:10px;background:hsl(158 20% 92%);border-radius:99px;overflow:hidden;margin:8px 0 6px}
  .track>div{height:100%;background:var(--eco);border-radius:99px}
  .cf-fade{animation:cfOut .35s forwards}
  @keyframes cfOut{to{opacity:0;transform:scale(.96);height:0;margin:0;padding:0;border-width:0}}
</style>
</head>
<body>
<div class="wrap">
<nav class="nav"><span class="brand">Atrium · concept</span><a href="index.html">Cash-flow</a><a href="timeline.html">Timeline</a><a href="impact.html" class="active">Impact</a></nav>
<div class="banner"><i class="ti ti-info-circle"></i> Concept preview · sample data — for feedback, not final visual design</div>
<div id="app">Loading…</div>
</div>
<script>
(function(){
  var app=document.getElementById('app');
  var DATA={
    portfolio:"Coastline Hospitality Group",
    solutions:[
      {id:'s1',prop:'Marina Bay Inn',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'~6 weeks · starts Sep',co2:180,market:430000,discountPct:12,incentive:130000,savings:75000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
      {id:'s5',prop:'Cedar Court Hotel',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'~5 weeks',co2:120,market:300000,discountPct:12,incentive:90000,savings:53000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
      {id:'s8',prop:'Riverside Lodge',type:'Heat Pump Water Heaters',u:0,vendor:'Thermal Systems',install:'~2 weeks',co2:40,market:52000,discountPct:12,incentive:12000,savings:12000,loan:{termYears:7,aprPct:6.9},lease:null},
      {id:'s2',prop:'Marina Bay Inn',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'~2 weeks',co2:55,market:72000,discountPct:12,incentive:15000,savings:17000,loan:{termYears:7,aprPct:6.9},lease:null},
      {id:'s9',prop:'Riverside Lodge',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'~1 week',co2:22,market:28000,discountPct:14,incentive:4000,savings:12500,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s6',prop:'Cedar Court Hotel',type:'LED Lighting',u:1,vendor:'BrightSwap',install:'~2 weeks',co2:30,market:46000,discountPct:13,incentive:6000,savings:13500,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s7',prop:'Cedar Court Hotel',type:'Ozone Laundry',u:1,vendor:'PureWash',install:'~1 week',co2:18,market:30000,discountPct:13,incentive:3000,savings:10000,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s3',prop:'Marina Bay Inn',type:'LED Lighting',u:2,vendor:'BrightSwap',install:'~2 weeks',co2:20,market:34000,discountPct:13,incentive:4000,savings:10000,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s4',prop:'Marina Bay Inn',type:'Smart Thermostats',u:2,vendor:'Cozy Controls',install:'~1 week',co2:8,market:10000,discountPct:14,incentive:1500,savings:4500,loan:{termYears:3,aprPct:7.9},lease:null}
    ]
  };
  var S={screen:'home',cat:null,leafId:null,period:'annual',approved:{},approvedMode:{},mode:{}};
  var UL=['Now','Soon','Later'];
  var CATS=[
    {key:'power',title:'Generate clean power',icon:'ti-sun',match:function(s){return s.type==='Solar + Batteries';}},
    {key:'heat',title:'Electrify heating',icon:'ti-flame',match:function(s){return s.type==='Heat Pump Water Heaters';}},
    {key:'usage',title:'Cut waste & usage',icon:'ti-bulb',match:function(s){return ['LED Lighting','Smart Thermostats','Ozone Laundry'].indexOf(s.type)>=0;}}
  ];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function cars(co2){return Math.round(co2/4.6);}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var m=S.mode[s.id]||'cash';return ms.indexOf(m)>=0?m:'cash';}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function sols(){return DATA.solutions.filter(function(s){return !S.approved[s.id];});}
  function sumCo2(a){return a.reduce(function(t,x){return t+x.co2;},0);}
  function sumFive(a){return a.reduce(function(t,x){return t+fiveCash(x);},0);}
  function recSort(a,b){ if(b.co2!==a.co2)return b.co2-a.co2; return fiveCash(b)-fiveCash(a); }
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){
      return {hero:'+'+per(sav), sub:'One-time '+fmt(nt)+' upfront, then it’s yours',
        chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs',
        takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};
    }
    if(mode==='loan'){
      var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;
      return {hero:'+'+per(sav-ann), sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'%',
        chips:[['Savings','+'+per(sav)],['Loan payment','−'+per(ann)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from day one',
        takeaway:'$0 down; you net '+per(sav-ann)+' from day one — best near-term cash flow.'};
    }
    var la=s.lease.annualAtrium,t2=s.lease.termYears;
    return {hero:'+'+per(sav-la), sub:'$0 down · '+t2+'-yr lease',
      chips:[['Savings','+'+per(sav)],['Lease cost','−'+per(la)],['Term',t2+' yrs']],
      series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from year one',
      takeaway:'$0 down; net '+per(sav-la)+' a year, no ownership or upkeep.'};
  }
  function spark(series,be){
    var w=300,h=72,pad=8,vals=series.concat([0]);
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;
    function X(y){return pad+(y/10)*(w-2*pad);}
    function Y(v){return pad+(1-(v-mn)/sp)*(h-2*pad);}
    var pts=series.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');
    var area=pts+' '+X(10).toFixed(1)+','+Y(mn).toFixed(1)+' '+X(0).toFixed(1)+','+Y(mn).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="var(--bg-success)"/>'
      +'<line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+pts+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<circle cx="'+X(be).toFixed(1)+'" cy="'+Y(0).toFixed(1)+'" r="3.5" fill="var(--eco)"/></svg>';
  }
  function backPill(){return '<button class="cf-pill" data-act="back" style="display:inline-flex;align-items:center;gap:4px"><i class="ti ti-arrow-left"></i> Back</button>';}
  function perToggle(){return '<div class="seg"><button data-period="annual" aria-pressed="'+(S.period==='annual')+'">Annual</button><button data-period="monthly" aria-pressed="'+(S.period==='monthly')+'">Monthly</button></div>';}
  function solutionCard(s){
    var mode=curMode(s), e=econ(s,mode), ms=solModes(s);
    var hint={cash:'Buy outright',loan:'Finance',lease:'Rent'};
    var payseg=ms.map(function(m){return '<button data-sol="'+s.id+'" data-segmode="'+m+'" aria-pressed="'+(mode===m)+'"><span style="display:block">'+cap(m)+'</span><span style="display:block;font-size:11px;font-weight:500;opacity:.85">'+hint[m]+'</span></button>';}).join('');
    var chips=e.chips.map(function(k){return '<div class="chip"><div class="k">'+k[0]+'</div><div class="v">'+k[1]+'</div></div>';}).join('');
    var savePct=Math.round((s.market-price(s))/s.market*100);
    return '<div class="card" data-row="'+s.id+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px">'
        +'<div><div style="font-size:18px;font-weight:700">'+esc(s.type)+'</div>'
          +'<div style="font-size:13px;color:var(--text-muted);margin-top:2px">'+esc(s.prop)+' · <i class="ti ti-tool"></i> '+esc(s.vendor)+' · '+esc(s.install)+'</div></div>'
        +'<span style="font-size:12px;font-weight:600;color:var(--eco);background:var(--bg-eco);border:1px solid var(--eco-border);border-radius:99px;padding:4px 10px;white-space:nowrap"><i class="ti ti-calendar"></i> Schedule: '+UL[s.u]+'</span></div>'
      +'<div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:var(--bg-eco);border:1px solid var(--eco-border);border-radius:10px;padding:11px 13px;margin-bottom:14px">'
        +'<i class="ti ti-leaf" style="font-size:22px;color:var(--eco)"></i>'
        +'<span style="font-size:22px;font-weight:700;color:var(--eco)">'+s.co2+' t CO₂/yr</span>'
        +'<span style="font-size:13px;color:var(--text-secondary)">avoided · ≈ '+cars(s.co2)+' cars off the road · '+(s.co2*10)+' t over 10 yrs</span></div>'
      +'<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);background:hsl(158 20% 98%);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:16px">'
        +'<span style="text-decoration:line-through;color:var(--text-muted)">'+fmt(s.market)+' market</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span>'+fmt(price(s))+' Atrium price <span style="color:var(--text-success);font-weight:600">(−'+savePct+'%)</span></span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span style="color:var(--text-success);font-weight:600">−'+fmt(s.incentive)+' incentive</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span style="font-weight:700;color:var(--text-primary)">'+fmt(net(s))+' your net</span></div>'
      +'<div style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px">How you’ll pay</div>'
      +'<div class="payseg" style="margin-bottom:16px">'+payseg+'</div>'
      +'<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text-muted)">Net cash flow</div>'
        +'<div style="font-size:30px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+e.hero+'</div>'
        +'<div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+e.sub+'</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:12px">'+chips+'</div>'
      +'<div style="background:hsl(158 20% 98.5%);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">'
        +spark(e.series,e.be)
        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span>10 yrs</span></div></div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px"><i class="ti ti-leaf" style="color:var(--eco)"></i> Cuts emissions and pays for itself — '+e.takeaway+'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<button class="cf-btn" data-approve="'+s.id+'"><i class="ti ti-check"></i> Approve with '+cap(mode)+'</button>'
        +'<button class="ghost"><i class="ti ti-file-text"></i> View full quote</button>'
        +'<button class="ghost"><i class="ti ti-message"></i> Ask a question</button></div>'
    +'</div>';
  }
  function progress(){
    var total=sumCo2(DATA.solutions), committed=sumCo2(DATA.solutions.filter(function(s){return S.approved[s.id];})), pct=Math.round(committed/total*100);
    return '<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;font-size:13px"><span style="font-weight:600">Path to net-zero</span><span style="color:var(--text-muted)">'+committed+' / '+total+' t CO₂/yr committed</span></div>'
      +'<div class="track"><div style="width:'+pct+'%"></div></div>'
      +'<div style="font-size:13px;color:var(--text-secondary)">'+pct+'% of the avoidable footprint · the full plan ≈ '+cars(total)+' cars off the road every year</div></div>';
  }
  function renderHome(){
    var live=sols();
    var sq=CATS.map(function(c){
      var g=live.filter(c.match);
      if(!g.length)return '<div class="cf-sq" style="min-height:150px;opacity:.7"><span style="color:var(--text-secondary);font-size:14px;font-weight:500">'+c.title+'</span><br><span style="color:var(--eco);font-size:18px"><i class="ti ti-circle-check"></i> All committed</span></div>';
      return '<button class="cf-sq" data-act="cat" data-val="'+c.key+'" style="display:flex;flex-direction:column;gap:6px;min-height:150px">'
        +'<span style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:14px;font-weight:500"><i class="ti '+c.icon+'" style="font-size:18px;color:var(--eco)"></i>'+c.title+'</span>'
        +'<span class="cf-amt" style="font-size:27px;color:var(--eco)">'+sumCo2(g)+'<span style="font-size:14px;color:var(--text-muted);font-weight:500"> t CO₂/yr</span></span>'
        +'<span style="font-size:13px;color:var(--text-secondary)">'+fmtK(sumFive(g))+' 5-yr cash · '+g.length+' project'+(g.length>1?'s':'')+'</span>'
        +'<span style="margin-top:auto;display:flex;justify-content:flex-end;color:var(--text-muted)"><i class="ti ti-arrow-right"></i></span></button>';
    }).join('');
    var total=sumCo2(DATA.solutions);
    app.innerHTML='<div style="margin-bottom:1.1rem"><p style="color:var(--text-secondary);margin:0;font-size:14px">'+esc(DATA.portfolio)+'</p>'
      +'<h1 style="margin:.2rem 0 .1rem;font-size:26px">Cut up to <span style="color:var(--eco)">'+total+' t CO₂/yr</span></h1>'
      +'<p style="color:var(--text-muted);margin:0 0 .8rem;font-size:13px">Every project lowers your footprint and pays for itself. Here’s your path — and what it saves.</p>'
      +progress()+'</div><div class="grid" style="margin-top:1rem">'+sq+'</div>';
  }
  function renderCat(){
    var c=CATS.find(function(x){return x.key===S.cat;});
    var live=sols().filter(c.match).sort(recSort);
    if(!live.length){S.screen='home';return renderHome();}
    var grid=live.map(function(s){
      return '<button class="cf-sq" data-act="leaf" data-val="'+s.id+'" style="display:flex;flex-direction:column;gap:6px;min-height:140px">'
        +'<span style="font-size:15px;font-weight:600">'+esc(s.prop)+'</span>'
        +'<span style="font-size:13px;color:var(--text-muted)">'+esc(s.type)+'</span>'
        +'<span class="cf-amt" style="font-size:22px;color:var(--eco)">'+s.co2+'<span style="font-size:13px;color:var(--text-muted);font-weight:500"> t CO₂/yr</span></span>'
        +'<span style="font-size:13px;color:var(--text-secondary)">'+fmtK(fiveCash(s))+' 5-yr cash · ≈ '+cars(s.co2)+' cars</span>'
        +'<span style="margin-top:auto;display:flex;justify-content:flex-end;color:var(--text-muted)"><i class="ti ti-arrow-right"></i></span></button>';
    }).join('');
    app.innerHTML='<div style="margin-bottom:1.25rem">'+backPill()+'<h1 style="margin:14px 0 0">'+esc(c.title)+'</h1><p style="color:var(--text-secondary);margin:.3rem 0 0">Emissions avoided per project — and the cash it throws off. Pick one to see the details.</p></div>'+'<div class="grid">'+grid+'</div>';
  }
  function renderLeaf(){
    var s=DATA.solutions.find(function(x){return x.id===S.leafId;});
    if(!s||S.approved[s.id]){S.screen='cat';return renderCat();}
    app.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()
      +'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span></div>'
      +solutionCard(s);
  }
  function render(){
    if(S.screen==='home')renderHome();
    else if(S.screen==='cat')renderCat();
    else if(S.screen==='leaf')renderLeaf();
  }
  function unlockRow(id,then){var row=app.querySelector('[data-row="'+id+'"]');if(row){row.classList.add('cf-fade');setTimeout(then,340);}else then();}
  app.addEventListener('click',function(e){
    var pertog=e.target.closest('[data-period]');
    if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]');
    if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var el=e.target.closest('[data-act],[data-approve]'); if(!el)return;
    if(el.dataset.approve){var s=DATA.solutions.find(function(x){return x.id===el.dataset.approve;});var m=curMode(s);unlockRow(s.id,function(){S.approved[s.id]=1;S.approvedMode[s.id]=m;S.screen='cat';render();});return;}
    var a=el.dataset.act, v=el.dataset.val;
    if(a==='cat'){S.cat=v;S.screen='cat';render();}
    else if(a==='leaf'){S.leafId=v;S.screen='leaf';render();}
    else if(a==='back'){S.screen=(S.screen==='leaf')?'cat':'home';render();}
  });
  render();
})();
</script>
</body>
</html>
