<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — leaf cost/benefit (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#fff;
    --text-warning:hsl(24 82% 40%);--radius:10px;
    --shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em;font-size:22px}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .chip{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .approved{background:var(--bg-success);border-color:hsl(86 40% 78%)}
</style>
</head>
<body>
<div class="wrap">
<div class="banner"><i class="ti ti-info-circle"></i> Concept preview · sample economics — structure mirrors real Solution fields (market/discount/incentive/net, annual savings, payback, Cash/Loan/Lease terms)</div>
<button class="cf-pill" style="display:inline-flex;align-items:center;gap:4px;margin-bottom:14px"><i class="ti ti-arrow-left"></i> Back</button>
<h1>Marina Bay Inn — proposed projects</h1>
<p style="color:var(--text-secondary);margin:.3rem 0 1.25rem">Two ways to unlock cash flow here. Compare the economics, pick how you pay, then approve.</p>
<div id="leaf"></div>
</div>
<script>
(function(){
  var host=document.getElementById('leaf');
  var CARDS=[
    {id:'c1',type:'Solar + Batteries',prop:'Marina Bay Inn',schedule:'Now',vendor:'GreenVolt Partners',install:'~6 weeks · starts Sep',
     market:430000,discountPct:12,price:380000,incentive:130000,net:250000,savings:76000,
     loan:{termYears:10,aprPct:6.5},lease:{annualMarket:52000,annualAtrium:44000,termYears:20},
     mode:'cash',approvedMode:null},
    {id:'c2',type:'Smart Thermostats',prop:'Marina Bay Inn',schedule:'Soon',vendor:'Cozy Controls',install:'~1 week',
     market:22000,discountPct:14,price:19000,incentive:3000,net:16000,savings:10500,
     loan:{termYears:3,aprPct:7.9},lease:null,
     mode:'cash',approvedMode:null}
  ];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function modes(c){var m=['cash'];if(c.loan)m.push('loan');if(c.lease)m.push('lease');return m;}
  function econ(c){
    var sav=c.savings,net=c.net,pay=net/sav;
    if(c.mode==='cash'){
      var five=5*sav-net, ten=10*sav-net;
      return {big:five, takeaway:'Pay '+fmtK(net)+' now, then keep the savings. Best lifetime return.',
        chips:[['Net cost today',fmtK(net)],['Annual savings',fmtK(sav)],['Payback',pay.toFixed(1)+' yrs'],['10-yr net',fmtK(ten)]],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-net+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs'};
    }
    if(c.mode==='loan'){
      var m=pmtMo(net,c.loan.aprPct,c.loan.termYears),ann=m*12,t=c.loan.termYears;
      var five=5*sav-Math.min(5,t)*ann, ten=10*sav-t*ann, netMo=sav/12-m;
      return {big:five, takeaway:'$0 down; +'+fmt(netMo)+'/mo from month one. Best near-term cash flow.',
        chips:[['Upfront','$0 down'],[c.loan.termYears+'-yr loan @ '+c.loan.aprPct+'%',fmt(m)+'/mo'],['Net cash flow','+'+fmt(netMo)+'/mo'],['10-yr net',fmtK(ten)]],
        series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from day one'};
    }
    var la=c.lease.annualAtrium,five=5*(sav-la),ten=10*(sav-la);
    return {big:five, takeaway:'$0 down; +'+fmtK(sav-la)+'/yr, no ownership or upkeep.',
      chips:[['Upfront','$0 down'],['Lease',fmtK(la)+'/yr'],['Net cash flow','+'+fmtK(sav-la)+'/yr'],['10-yr net',fmtK(ten)]],
      series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from year one'};
  }
  function spark(series,be){
    var w=300,h=72,pad=8,vals=series.concat([0]);
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;
    function X(y){return pad+(y/10)*(w-2*pad);}
    function Y(v){return pad+(1-(v-mn)/sp)*(h-2*pad);}
    var pts=series.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');
    var area=pts+' '+X(10).toFixed(1)+','+Y(mn).toFixed(1)+' '+X(0).toFixed(1)+','+Y(mn).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 95%)"/>'
      +'<line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+pts+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<circle cx="'+X(be).toFixed(1)+'" cy="'+Y(0).toFixed(1)+'" r="3.5" fill="var(--primary)"/></svg>';
  }
  function render(){
    host.innerHTML=CARDS.map(function(c){
      var e=econ(c),ms=modes(c),done=!!c.approvedMode;
      var seg=ms.map(function(m){return '<button data-card="'+c.id+'" data-mode="'+m+'" aria-pressed="'+(c.mode===m)+'"'+(done?' disabled style="opacity:.5;cursor:default"':'')+'>'+cap(m)+'</button>';}).join('');
      var chips=e.chips.map(function(k){return '<div class="chip"><div class="k">'+k[0]+'</div><div class="v">'+k[1]+'</div></div>';}).join('');
      var savePct=Math.round((c.market-c.price)/c.market*100);
      return '<div class="card'+(done?' approved':'')+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px">'
          +'<div><div style="font-size:17px;font-weight:700">'+c.type+'</div>'
            +'<div style="font-size:13px;color:var(--text-muted);margin-top:2px"><i class="ti ti-tool"></i> '+c.vendor+' · '+c.install+'</div></div>'
          +'<span style="font-size:12px;font-weight:600;color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%);border-radius:99px;padding:4px 10px;white-space:nowrap"><i class="ti ti-calendar"></i> Schedule: '+c.schedule+'</span></div>'
        +'<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);background:hsl(240 20% 98%);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:14px">'
          +'<span style="text-decoration:line-through;color:var(--text-muted)">'+fmtK(c.market)+' market</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
          +'<span>'+fmtK(c.price)+' Atrium price <span style="color:var(--text-success);font-weight:600">(−'+savePct+'%)</span></span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
          +'<span style="color:var(--text-success);font-weight:600">−'+fmtK(c.incentive)+' incentive</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
          +'<span style="font-weight:700;color:var(--text-primary)">'+fmtK(c.net)+' your net</span></div>'
        +'<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">'
          +'<div><div style="font-size:12px;color:var(--text-muted)">5-year net cash flow</div>'
            +'<div style="font-size:30px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+fmtK(e.big)+'</div></div>'
          +'<div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;text-align:right">How you pay</div><div class="seg">'+seg+'</div></div></div>'
        +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px;margin-bottom:12px">'+chips+'</div>'
        +'<div style="background:hsl(240 20% 98.5%);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">'
          +spark(e.series,e.be)
          +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span>10 yrs</span></div></div>'
        +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px"><i class="ti ti-bulb" style="color:var(--text-warning)"></i> '+e.takeaway+'</div>'
        +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
          +(done
            ? '<span style="color:var(--text-success);font-weight:600"><i class="ti ti-circle-check"></i> Approved with '+cap(c.approvedMode)+' — we’ll schedule it</span>'
            : '<button class="cf-btn" data-approve="'+c.id+'"><i class="ti ti-check"></i> Approve with '+cap(c.mode)+'</button>')
          +'<button class="ghost"><i class="ti ti-file-text"></i> View full quote</button>'
          +'<button class="ghost"><i class="ti ti-message"></i> Ask a question</button></div>'
      +'</div>';
    }).join('');
  }
  host.addEventListener('click',function(ev){
    var seg=ev.target.closest('[data-mode]');
    if(seg&&!seg.disabled){var c=CARDS.find(function(x){return x.id===seg.dataset.card;});c.mode=seg.dataset.mode;render();return;}
    var ap=ev.target.closest('[data-approve]');
    if(ap){var c2=CARDS.find(function(x){return x.id===ap.dataset.approve;});c2.approvedMode=c2.mode;render();}
  });
  render();
})();
</script>
</body>
</html>
